services:
  redis:
    image: redis:alpine
    ports:
      - 6379:6379
  compute-db:
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_USER: test
    ports:
      - 5432:5432
    volumes:
      - ./init_compute_db.sql:/docker-entrypoint-initdb.d/init_compute_db.sql:ro
  cache-db:
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_USER: test
      POSTGRES_DB: result_db
    ports:
      - 5431:5432
  adminer:
    image: adminer
    ports:
      - 8080:8080
